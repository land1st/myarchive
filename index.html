<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body, input, select, textarea, button {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif !important;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body, header, main, aside, nav, div, input, select, textarea, button, h2, h3, p, span {
            transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease;
        }
    </style>
</head>
<body id="app-body" class="bg-[#f8f9fa] text-[#212529] min-h-screen pb-24 lg:pb-6">

    <header id="app-header" class="border-b border-[#e9ecef] bg-white sticky top-0 z-50 px-4 py-3.5 flex items-center justify-between shadow-sm">
        <div onclick="openTab('dashboard')" class="flex items-center space-x-2 cursor-pointer group select-none">
            <span class="text-xl font-extrabold tracking-tight text-blue-600 flex items-center">
                <i class="fa-solid fa-box-archive mr-2 text-blue-500 group-hover:scale-105 transition-transform"></i>My Archive
            </span>
        </div>
        <div class="flex items-center space-x-2 lg:space-x-3">
            <button onclick="toggleThemeMode()" id="theme-toggle-btn" class="text-gray-500 hover:text-gray-900 text-lg p-1.5 rounded-lg hover:bg-gray-100 transition mr-1">
                <i class="fa-solid fa-moon"></i>
            </button>
            
            <div id="google-btn-group" class="flex items-center gap-1.5">
                <button onclick="handleSyncButtonClick()" id="sync-status" class="text-xs bg-gray-100 text-gray-600 px-3 py-1.5 rounded-full border border-gray-200 font-semibold cursor-pointer flex items-center gap-1.5 transition shadow-sm">
                    <i class="fa-solid fa-circle-notch fa-spin hidden" id="sync-spinner"></i>
                    <i class="fa-brands fa-google" id="sync-icon"></i>
                    <span id="sync-text">구글 계정 연동</span>
                </button>
                
                <button onclick="manualBackupToDrive()" id="manual-backup-btn" class="hidden text-xs bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-full font-semibold cursor-pointer flex items-center gap-1 transition shadow-sm">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <span>구글에 백업하기</span>
                </button>
            </div>
            
            <button onclick="openTab('settings')" class="text-gray-500 hover:text-gray-900 text-lg transition ml-1"><i class="fa-solid fa-gear"></i></button>
        </div>
    </header>

    <div class="max-w-[1400px] mx-auto p-4 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <main class="lg:col-span-3 space-y-6">
            
            <section id="main-dashboard" class="space-y-6 tab-content">
                <div id="search-filter-box" class="flex flex-col md:flex-row gap-4 items-center justify-between bg-white p-4 rounded-xl border border-[#e9ecef] shadow-sm">
                    <div class="relative w-full md:w-80">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-gray-400 text-sm"></i>
                        <input type="text" id="search-input" oninput="renderCards()" placeholder="기록된 모든 미디어 검색..." class="w-full bg-[#f1f3f5] pl-10 pr-4 py-2.5 rounded-lg text-sm text-[#495057] focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 border border-transparent transition">
                    </div>
                    <div class="flex space-x-1.5 overflow-x-auto w-full md:w-auto no-scrollbar py-1">
                        <button onclick="filterCategory('all')" id="btn-filter-all" class="filter-btn px-4 py-2 rounded-lg text-sm font-semibold bg-blue-600 text-white shrink-0 shadow-sm transition">전체</button>
                        <button onclick="filterCategory('book')" id="btn-filter-book" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-[#f1f3f5] text-[#495057] hover:bg-[#e9ecef] shrink-0 transition">📚 독서</button>
                        <button onclick="filterCategory('movie')" id="btn-filter-movie" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-[#f1f3f5] text-[#495057] hover:bg-[#e9ecef] shrink-0 transition">🎬 영화</button>
                        <button onclick="filterCategory('drama')" id="btn-filter-drama" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-[#f1f3f5] text-[#495057] hover:bg-[#e9ecef] shrink-0 transition">📺 드라마/예능</button>
                        <button onclick="filterCategory('music')" id="btn-filter-music" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-[#f1f3f5] text-[#495057] hover:bg-[#e9ecef] shrink-0 transition">🎵 음악</button>
                    </div>
                </div>

                <div id="media-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-5">
                    </div>
            </section>

            <section id="book-search-tab" class="tab-content hidden space-y-4">
                <div id="book-box" class="bg-white p-5 rounded-xl border border-[#e9ecef] shadow-sm space-y-4">
                    <h2 id="book-title-txt" class="text-lg font-bold text-[#212529]">📚 독서 자동 기록 검색</h2>
                    <div class="flex gap-2">
                        <input type="text" id="api-book-search" placeholder="책 제목, 저자명을 입력해 보세요..." class="w-full bg-[#f1f3f5] text-gray-800 px-4 py-3 rounded-lg text-sm focus:outline-none border border-transparent focus:border-blue-500">
                        <button onclick="simulateBookSearch()" class="bg-blue-600 text-white px-5 py-3 rounded-lg text-sm font-semibold hover:bg-blue-700 shrink-0"><i class="fa-solid fa-magnifying-glass"></i> 검색</button>
                    </div>
                    <div id="search-results" class="space-y-2 hidden">
                        <div onclick="selectBook('프로젝트 헤일메리', '앤디 위어', 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500')" class="flex items-center gap-4 bg-[#f8f9fa] p-3 rounded-xl cursor-pointer hover:border-blue-500 border border-transparent transition shadow-sm">
                            <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500" class="w-10 h-14 object-cover rounded shadow-sm">
                            <div>
                                <h4 class="text-sm font-bold text-black">프로젝트 헤일메리</h4>
                                <p class="text-xs text-gray-500">저자: 앤디 위어 | 출판사: 알에이치코리아</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="stats-tab" class="tab-content hidden space-y-4">
                <div id="stats-box" class="bg-white p-5 rounded-xl border border-[#e9ecef] shadow-sm">
                    <h2 id="stats-title-txt" class="text-lg font-bold mb-4">📊 기록 분석 통계</h2>
                    <div class="space-y-4">
                        <div>
                            <div class="flex justify-between text-xs font-semibold mb-1"><span>🎬 총 아카이브 미디어 수량</span><span id="stat-count-media">0개</span></div>
                            <div class="w-full bg-[#e9ecef] h-2.5 rounded-full"><div class="bg-blue-500 h-2.5 rounded-full" style="width: 70%"></div></div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="settings-tab" class="tab-content hidden space-y-4">
                <div id="settings-box" class="bg-white p-5 rounded-xl border border-[#e9ecef] shadow-sm space-y-4">
                    <h2 id="settings-title-txt" class="text-lg font-bold">⚙️ 시스템 옵션</h2>
                    <div class="flex flex-wrap gap-2 pt-2">
                        <button onclick="exportData()" class="bg-white border border-[#ced4da] px-4 py-2.5 rounded-lg text-xs font-semibold hover:bg-[#f1f3f5] transition">📁 데이터 내보내기 (JSON)</button>
                        <button onclick="shareApp()" class="bg-blue-50 text-blue-600 px-4 py-2.5 rounded-lg text-xs font-semibold hover:bg-blue-100 transition">🔗 앱 주소 공유</button>
                    </div>
                </div>
            </section>
        </main>

        <aside class="hidden lg:block lg:col-span-1">
            <div id="form-box" class="bg-white p-5 rounded-xl border border-[#e9ecef] shadow-sm sticky top-24 space-y-4">
                <h3 id="form-title-txt" class="text-sm font-bold text-gray-800 flex items-center"><i class="fa-solid fa-pen-to-square text-blue-500 mr-2"></i>새 미디어 기록</h3>
                
                <form id="media-form" onsubmit="handleFormSubmit(event)" class="space-y-3.5 text-xs">
                    <div>
                        <label id="lbl-type" class="block mb-1 text-gray-500 font-semibold">구분</label>
                        <select id="form-type" onchange="handleTypeChange()" class="w-full bg-[#f1f3f5] border-transparent rounded-lg p-2.5 text-[#495057] font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500/20">
                            <option value="MOVIE">🎬 영화</option>
                            <option value="DRAMA">📺 드라마/예능</option>
                            <option value="BOOK">📚 독서</option>
                            <option value="MUSIC">🎵 음악</option>
                        </select>
                    </div>
                    <div>
                        <label id="lbl-title" class="block mb-1 text-gray-500 font-semibold">콘텐츠 제목</label>
                        <input type="text" id="form-title" required class="w-full bg-[#f1f3f5] border-transparent rounded-lg p-2.5 text-sm text-[#495057] focus:outline-none focus:ring-2 focus:ring-blue-500/20" placeholder="제목 입력">
                    </div>
                    <div id="book-meta-fields" class="hidden">
                        <label id="lbl-author" class="block mb-1 text-gray-500 font-semibold">저자 / 출판사</label>
                        <input type="text" id="form-author" class="w-full bg-[#f1f3f5] border-transparent rounded-lg p-2.5 focus:outline-none text-[#495057]" placeholder="예: 앤디 위어">
                    </div>
                    
                    <div id="progress-tracking-box" class="hidden p-3 rounded-lg border border-gray-200/60 space-y-3">
                        <div class="flex items-center justify-between font-semibold text-gray-500">
                            <span id="progress-lbl-title">콘텐츠 트래커</span>
                            <span id="progress-live-percent" class="text-blue-500 font-bold">0%</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label id="lbl-total-unit" class="block mb-1 text-[11px] text-gray-400">전체 페이지 수</label>
                                <input type="number" id="form-progress-total" value="100" min="1" oninput="syncProgressSliderMax(); calculateLivePercent();" class="w-full bg-[#f1f3f5] border-transparent rounded-lg p-2 focus:outline-none text-[#495057]">
                            </div>
                            <div>
                                <label id="lbl-current-unit" class="block mb-1 text-[11px] text-gray-400">현재 읽은 페이지</label>
                                <input type="number" id="form-progress-current" value="0" min="0" oninput="syncProgressSliderVal(); calculateLivePercent();" class="w-full bg-[#f1f3f5] border-transparent rounded-lg p-2 focus:outline-none text-[#495057]">
                            </div>
                        </div>
                        <div>
                            <input type="range" id="form-progress-range" min="0" max="100" value="0" oninput="syncProgressInputVal(); calculateLivePercent();" class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                        </div>
                    </div>

                    <div>
                        <label id="lbl-tags" class="block mb-1 text-gray-500 font-semibold">플랫폼 / 커스텀 태그</label>
                        <input type="text" id="form-tags" class="w-full bg-[#f1f3f5] border-transparent rounded-lg p-2.5 focus:outline-none text-[#495057]" placeholder="쉼표로 구분 (예: 넷플릭스, 아이맥스)">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label id="lbl-start" class="block mb-1 text-gray-500 font-semibold">시작(관람)일</label>
                            <input type="date" id="form-start" class="w-full bg-[#f1f3f5] border-transparent rounded-lg p-2 focus:outline-none text-[#495057]">
                        </div>
                        <div>
                            <label id="lbl-end" class="block mb-1 text-gray-500 font-semibold">종료일</label>
                            <input type="date" id="form-end" class="w-full bg-[#f1f3f5] border-transparent rounded-lg p-2 focus:outline-none text-[#495057]">
                        </div>
                    </div>
                    <div>
                        <label id="lbl-rating" class="block mb-1 text-gray-500 font-semibold">평점</label>
                        <select id="form-rating" class="w-full bg-[#f1f3f5] border-transparent rounded-lg p-2.5 text-amber-500 font-bold focus:outline-none">
                            <option value="5">⭐⭐⭐⭐⭐ (5.0)</option>
                            <option value="4">⭐⭐⭐⭐☆ (4.0)</option>
                            <option value="3">⭐⭐⭐☆☆ (3.0)</option>
                            <option value="2">⭐⭐☆☆☆ (2.0)</option>
                            <option value="1">⭐☆☆☆☆ (1.0)</option>
                        </select>
                    </div>
                    <div>
                        <label id="lbl-image" class="block mb-1 text-gray-500 font-semibold">커버 이미지 웹 주소 (URL)</label>
                        <input type="url" id="form-image" class="w-full bg-[#f1f3f5] border-transparent rounded-lg p-2.5 focus:outline-none text-[#495057]" placeholder="https://...">
                    </div>
                    <div>
                        <label id="lbl-review" class="block mb-1 text-gray-500 font-semibold">한줄평 / 감상 기록</label>
                        <textarea id="form-review" rows="3" class="w-full bg-[#f1f3f5] border-transparent rounded-lg p-2.5 focus:outline-none text-[#495057]" placeholder="기록하고 싶은 감상을 작성하세요..."></textarea>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition text-sm shadow-sm">
                        로그 저장하기
                    </button>
                </form>
            </div>
        </aside>
    </div>

    <nav id="app-nav" class="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-[#e9ecef] grid grid-cols-4 text-center py-2.5 z-40 shadow-[0_-2px_10px_rgba(0,0,0,0.03)]">
        <button onclick="openTab('dashboard')" class="nav-btn text-blue-600 flex flex-col items-center justify-center space-y-1">
            <i class="fa-solid fa-chart-simple text-lg"></i><span class="text-[10px] font-bold">대시보드</span>
        </button>
        <button onclick="openTab('book-search')" class="nav-btn text-gray-400 flex flex-col items-center justify-center space-y-1">
            <i class="fa-solid fa-magnifying-glass text-lg"></i><span class="text-[10px] font-medium">북 검색</span>
        </button>
        <button onclick="openTab('stats')" class="nav-btn text-gray-400 flex flex-col items-center justify-center space-y-1">
            <i class="fa-solid fa-pie-chart text-lg"></i><span class="text-[10px] font-medium">통계</span>
        </button>
        <button onclick="openTab('settings')" class="nav-btn text-gray-400 flex flex-col items-center justify-center space-y-1">
            <i class="fa-solid fa-sliders text-lg"></i><span class="text-[10px] font-medium">설정</span>
        </button>
    </nav>

    <div id="detail-modal" class="fixed inset-0 bg-black/50 items-center justify-center z-50 p-4 hidden flex">
        <div id="modal-card-box" class="bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden border border-[#e9ecef] flex flex-col transition-colors duration-150">
            <div class="relative h-48 bg-[#f1f3f5] overflow-hidden">
                <img id="modal-img" src="" class="w-full h-full object-cover">
                <button onclick="closeDetailModal()" class="absolute top-3 right-3 bg-black/40 hover:bg-black/60 text-white w-8 h-8 rounded-full flex items-center justify-center transition"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="p-5 space-y-4 flex-grow text-xs">
                <input type="hidden" id="modal-id">
                <div>
                    <span id="modal-type-badge" class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded text-[10px] font-bold border border-blue-100">TYPE</span>
                    <h3 id="modal-title" class="text-base font-bold text-[#212529] mt-1.5">콘텐츠 명</h3>
                </div>
                
                <div id="modal-progress-box" class="hidden p-3 rounded-lg bg-gray-50 space-y-2">
                    <div class="flex justify-between font-semibold text-gray-400">
                        <span id="modal-progress-lbl">현재 진행률</span>
                        <span id="modal-live-percent" class="text-blue-500 font-bold">0%</span>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="modal-progress-total" oninput="calculateModalLivePercent();" class="bg-white p-2 rounded text-center text-sm focus:outline-none">
                        <input type="number" id="modal-progress-current" oninput="calculateModalLivePercent();" class="bg-white p-2 rounded text-center text-sm focus:outline-none">
                    </div>
                </div>

                <div class="space-y-3">
                    <div>
                        <label id="lbl-modal-review" class="block text-gray-400 font-semibold mb-1">한줄평 수정</label>
                        <textarea id="modal-review" rows="3" class="w-full bg-[#f1f3f5] text-[#495057] p-2.5 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 border border-transparent"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label id="lbl-modal-rating" class="block text-gray-400 font-semibold mb-1">평점 수정</label>
                            <select id="modal-rating" class="w-full bg-[#f1f3f5] p-2 rounded-lg font-bold text-amber-500 text-sm focus:outline-none">
                                <option value="5">⭐⭐⭐⭐⭐</option>
                                <option value="4">⭐⭐⭐⭐☆</option>
                                <option value="3">⭐⭐⭐☆☆</option>
                                <option value="2">⭐⭐☆☆☆</option>
                                <option value="1">⭐☆☆☆☆</option>
                            </select>
                        </div>
                        <div>
                            <label id="lbl-modal-date" class="block text-gray-400 font-semibold mb-1">기록일 확인</label>
                            <div id="modal-date-display" class="bg-[#f1f3f5] p-2 rounded-lg text-gray-600 font-medium text-center text-sm"></div>
                        </div>
                    </div>
                </div>

                <div class="flex items-center gap-2 pt-3 border-t border-[#e9ecef]">
                    <button onclick="submitUpdateLog()" class="flex-grow bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg text-xs font-bold transition">수정사항 저장</button>
                    <button onclick="submitDeleteLog()" class="bg-red-50 text-red-600 border border-red-200 px-4 py-2.5 rounded-lg text-xs font-bold transition">삭제</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = '148691412107-od4tsqpl11hvm4sbajuku7t1dh8l1p23.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.appdata';
        const BACKUP_FILE_NAME = 'my_archive_data.json';

        let tokenClient;
        let gapiInited = false;
        let gisInited = false;
        let googleAccessToken = null;
        let driveFileId = null;

        const defaultArchive = [
            { id: 1, type: 'DRAMA', title: '사냥개들2', tags: ['DRAMA', '넷플릭스', '완주'], rating: 5, review: '액션은 최고 수준', start: '2026-04-03', end: '2026-04-05', image: 'https://images.unsplash.com/photo-1601513525393-8393e2938e36?w=500', totalUnit: 8, currentUnit: 8 },
            { id: 2, type: 'DRAMA', title: '레이디두아', tags: ['DRAMA', '넷플릭스', '완주'], rating: 4, review: '명품? No 사치품 !!!', start: '2026-03-27', end: '2026-03-28', image: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=500', totalUnit: 12, currentUnit: 6 },
            { id: 3, type: 'MOVIE', title: '행복의 나라로', tags: ['MOVIE'], rating: 5, review: '이선균 송영규 두 분 명목을 빕니다.', start: '2026-03-23', end: '', image: 'https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=500' },
            { id: 4, type: 'BOOK', title: '프로젝트 헤일 메리', tags: ['MOVIE', 'IMAX'], rating: 5, review: '아이맥스 최고', start: '2026-03-21', end: '', image: 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500', totalUnit: 540, currentUnit: 180 }
        ];

        let archiveLogs = JSON.parse(localStorage.getItem('archiveLogs')) || defaultArchive;
        let currentCategory = 'all';
        let currentThemeMode = localStorage.getItem('themeMode') || 'light';

        window.onload = function() {
            applyThemeMode(currentThemeMode);
            renderCards();
            document.getElementById('form-start').value = new Date().toISOString().split('T')[0];
            
            gapi.load('client', initGapiClient);
            initHasClient();
            handleTypeChange();
        };

        function initGapiClient() {
            gapi.client.init({
                discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
            }).then(() => {
                gapiInited = true;
                checkAuthStates();
            }).catch(err => console.error(err));
        }

        function initHasClient() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    if (tokenResponse.error !== undefined) {
                        showSyncStatus('error', '구글 인증 실패');
                        return;
                    }
                    googleAccessToken = tokenResponse.access_token;
                    localStorage.setItem('googleToken', googleAccessToken);
                    showSyncStatus('loading', '데이터 동기화 중...');
                    loadDataFromGoogleDrive();
                },
            });
            gisInited = true;
            checkAuthStates();
        }

        function checkAuthStates() {
            const savedToken = localStorage.getItem('googleToken');
            if (gapiInited && gisInited && savedToken) {
                googleAccessToken = savedToken;
                gapi.client.setToken({ access_token: googleAccessToken });
                loadDataFromGoogleDrive();
            }
        }

        function handleSyncButtonClick() {
            if (!googleAccessToken) {
                tokenClient.requestAccessToken({ prompt: 'consent' });
            } else {
                if(confirm("구글 계정 연동을 해제(로그아웃)하시겠습니까?\n보관된 로컬 아카이브 기록은 안전하게 유지됩니다.")) {
                    googleAccessToken = null;
                    driveFileId = null;
                    localStorage.removeItem('googleToken');
                    showSyncStatus('unlinked', '구글 계정 연동');
                }
            }
        }

        // ☁️ 명시적 수동 백업 처리기 함수
        function manualBackupToDrive() {
            if (!googleAccessToken) {
                alert("구글 연동이 완료되지 않았습니다.");
                return;
            }
            showSyncStatus('loading', '구글 드라이브에 강제 백업 중...');
            uploadDataToGoogleDrive(false, true);
        }

        function loadDataFromGoogleDrive() {
            gapi.client.setToken({ access_token: googleAccessToken });
            gapi.client.drive.files.list({
                q: `name='${BACKUP_FILE_NAME}' and trashed=false`,
                fields: 'files(id, name)',
                spaces: 'drive'
            }).then(response => {
                const files = response.result.files;
                if (files && files.length > 0) {
                    driveFileId = files[0].id;
                    gapi.client.drive.files.get({
                        fileId: driveFileId,
                        alt: 'media'
                    }).then(res => {
                        if (res.result && Array.isArray(res.result)) {
                            const cloudData = res.result;
                            const localMap = new Map(archiveLogs.map(item => [item.id, item]));
                            
                            // 양방향 머지 후 클라우드 역반영 기믹 적용
                            cloudData.forEach(item => localMap.set(item.id, item));
                            archiveLogs = Array.from(localMap.values());
                            localStorage.setItem('archiveLogs', JSON.stringify(archiveLogs));
                            renderCards();
                            
                            // 로그인 성공 완료 시점에 누락 없이 클라우드로 최신 스냅샷 업로드
                            uploadDataToGoogleDrive(false, false);
                        } else {
                            showSyncStatus('success', '구글 로그아웃');
                        }
                    }).catch(err => {
                        console.error(err);
                        showSyncStatus('unlinked', '구글 계정 연동');
                        googleAccessToken = null;
                        localStorage.removeItem('googleToken');
                    });
                } else {
                    uploadDataToGoogleDrive(true, false);
                }
            }).catch(err => {
                console.error(err);
                showSyncStatus('error', '구글 연동 에러');
            });
        }

        function uploadDataToGoogleDrive(isFirstCreation = false, isManualAlert = false) {
            if (!googleAccessToken) return;
            gapi.client.setToken({ access_token: googleAccessToken });

            const boundary = 'foo_bar_baz_boundary';
            const delimiter = `\r\n--${boundary}\r\n`;
            const close_delim = `\r\n--${boundary}--`;

            const metadata = {
                name: BACKUP_FILE_NAME,
                mimeType: 'application/json'
            };

            const data = JSON.stringify(archiveLogs);
            let multipartRequestBody =
                delimiter +
                'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
                JSON.stringify(metadata) +
                delimiter +
                'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
                data +
                close_delim;

            if (isFirstCreation || !driveFileId) {
                gapi.client.request({
                    path: '/upload/drive/v3/files',
                    method: 'POST',
                    params: { uploadType: 'multipart' },
                    headers: { 'Content-Type': `multipart/related; boundary=${boundary}` },
                    body: multipartRequestBody
                }).then(res => {
                    driveFileId = res.result.id;
                    showSyncStatus('success', '구글 로그아웃');
                    if (isManualAlert) alert("구글 드라이브에 안전하게 첫 백업 아카이브 공간이 생성 및 저장되었습니다!");
                }).catch(err => console.error(err));
            } else {
                gapi.client.request({
                    path: `/upload/drive/v3/files/${driveFileId}`,
                    method: 'PATCH',
                    params: { uploadType: 'multipart' },
                    headers: { 'Content-Type': `multipart/related; boundary=${boundary}` },
                    body: multipartRequestBody
                }).then(() => {
                    showSyncStatus('success', '구글 로그아웃');
                    if (isManualAlert) alert("현재 로컬 대시보드의 모든 데이터가 구글 드라이브 클라우드로 완벽하게 백업 완료되었습니다!");
                }).catch(err => console.error(err));
            }
        }

        function showSyncStatus(type, message) {
            const btn = document.getElementById('sync-status');
            const icon = document.getElementById('sync-icon');
            const spinner = document.getElementById('sync-spinner');
            const txt = document.getElementById('sync-text');
            const manualBtn = document.getElementById('manual-backup-btn');

            spinner.classList.add('hidden');
            icon.classList.remove('hidden', 'text-gray-500', 'text-gray-400', 'text-blue-500', 'text-emerald-500', 'text-amber-500', 'fa-brands', 'fa-solid', 'fa-google', 'fa-triangle-exclamation');
            txt.innerText = message;

            if (type === 'success') {
                btn.className = "text-xs bg-emerald-50 text-emerald-600 px-3 py-1.5 rounded-full border border-emerald-200 font-semibold cursor-pointer flex items-center gap-1.5 transition shadow-sm hover:bg-red-50 hover:text-red-600 hover:border-red-200";
                icon.className = "fa-brands fa-google text-emerald-500";
                if(manualBtn) manualBtn.classList.remove('hidden');
            } else if (type === 'loading') {
                btn.className = "text-xs bg-blue-50 text-blue-600 px-3 py-1.5 rounded-full border border-blue-200 font-semibold flex items-center gap-1.5 transition shadow-sm";
                icon.className = "hidden";
                spinner.classList.remove('hidden');
            } else if (type === 'unlinked') {
                const isDark = currentThemeMode === 'dark';
                btn.className = isDark 
                    ? "text-xs bg-[#262930] text-gray-300 px-3 py-1.5 rounded-full border border-transparent font-semibold cursor-pointer flex items-center gap-1.5 transition shadow-sm hover:bg-[#31353e]"
                    : "text-xs bg-gray-100 text-gray-600 px-3 py-1.5 rounded-full border border-gray-200 font-semibold cursor-pointer flex items-center gap-1.5 transition shadow-sm hover:bg-gray-200";
                icon.className = "fa-brands fa-google " + (isDark ? 'text-gray-400' : 'text-gray-500');
                if(manualBtn) manualBtn.classList.add('hidden');
            } else {
                btn.className = "text-xs bg-amber-50 text-amber-600 px-3 py-1.5 rounded-full border border-amber-200 font-semibold cursor-pointer flex items-center gap-1.5 transition shadow-sm";
                icon.className = "fa-solid fa-triangle-exclamation text-amber-500";
            }
        }

        function syncProgressSliderMax() {
            const total = parseInt(document.getElementById('form-progress-total').value) || 1;
            const slider = document.getElementById('form-progress-range');
            const currentInput = document.getElementById('form-progress-current');
            slider.max = total;
            currentInput.max = total;
        }
        function syncProgressSliderVal() {
            const current = parseInt(document.getElementById('form-progress-current').value) || 0;
            document.getElementById('form-progress-range').value = current;
        }
        function syncProgressInputVal() {
            const sliderVal = document.getElementById('form-progress-range').value;
            document.getElementById('form-progress-current').value = sliderVal;
        }
        function calculateLivePercent() {
            const total = parseInt(document.getElementById('form-progress-total').value) || 1;
            const current = parseInt(document.getElementById('form-progress-current').value) || 0;
            const pct = Math.min(100, Math.round((current / total) * 100));
            document.getElementById('progress-live-percent').innerText = `${pct}%`;
        }

        function calculateModalLivePercent() {
            const total = parseInt(document.getElementById('modal-progress-total').value) || 1;
            const current = parseInt(document.getElementById('modal-progress-current').value) || 0;
            const pct = Math.min(100, Math.round((current / total) * 100));
            document.getElementById('modal-live-percent').innerText = `${pct}%`;
        }

        function getSortedArchiveLogs() {
            return [...archiveLogs].sort((a, b) => {
                const dateA = a.start ? a.start : "0000-00-00";
                const dateB = b.start ? b.start : "0000-00-00";
                if (dateA < dateB) return 1;
                if (dateA > dateB) return -1;
                return b.id - a.id;
            });
        }

        function renderCards() {
            const grid = document.getElementById('media-grid');
            const keyword = document.getElementById('search-input').value.toLowerCase();
            grid.innerHTML = '';

            const sortedData = getSortedArchiveLogs();
            const items = sortedData.filter(log => {
                const isCat = currentCategory === 'all' || log.type.toLowerCase() === currentCategory;
                const isKey = log.title.toLowerCase().includes(keyword) || log.review.toLowerCase().includes(keyword);
                return isCat && isKey;
            });

            document.getElementById('stat-count-media').innerText = `${archiveLogs.length}개`;

            if (items.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-16 text-gray-400 text-sm">아카이브가 텅 비어 있습니다.</div>`;
                return;
            }

            items.forEach(log => {
                const stars = '★'.repeat(log.rating) + '☆'.repeat(5 - log.rating);
                const isDark = currentThemeMode === 'dark';
                const cardBg = isDark ? "bg-[#1a1a1e] border-gray-800 hover:border-gray-700" : "bg-white border-[#e9ecef] shadow-sm hover:shadow-md hover:border-gray-300";
                const titleColor = isDark ? "text-white" : "text-black";
                const reviewColor = isDark ? "text-gray-400" : "text-[#495057]";
                const tagBg = isDark ? "bg-[#26262b] text-gray-300 border-gray-700" : "bg-[#f1f3f5] text-[#495057] border-[#e9ecef]";

                const tagSection = log.tags.map(t => `<span class="${tagBg} px-2 py-0.5 rounded text-[10px] font-semibold border">${t}</span>`).join('');
                const dateView = log.end ? `${log.start.replace(/-/g, '/')} - ${log.end.replace(/-/g, '/')}` : log.start.replace(/-/g, '/');

                let progressGaugeMarkup = '';
                if (log.totalUnit && log.totalUnit > 0) {
                    const currentUnit = log.currentUnit || 0;
                    const pct = Math.min(100, Math.round((currentUnit / log.totalUnit) * 100));
                    const unitLabel = log.type === 'BOOK' ? '페이지' : '회차';
                    
                    progressGaugeMarkup = `
                        <div class="mt-2 space-y-1">
                            <div class="flex justify-between text-[10px] font-medium text-gray-400">
                                <span>진행도: ${currentUnit}/${log.totalUnit} ${unitLabel}</span>
                                <span class="text-blue-500 font-bold">${pct}%</span>
                            </div>
                            <div class="w-full bg-gray-200 h-1.5 rounded-full overflow-hidden">
                                <div class="${pct === 100 ? 'bg-emerald-500' : 'bg-blue-500'} h-full rounded-full transition-all" style="width: ${pct}%"></div>
                            </div>
                        </div>
                    `;
                }

                const card = document.createElement('div');
                card.className = `${cardBg} rounded-xl overflow-hidden transition duration-200 cursor-pointer flex flex-col border`;
                card.setAttribute("onclick", `openDetailModal(${log.id})`);
                
                card.innerHTML = `
                    <div class="relative pt-[52%] bg-gray-800 overflow-hidden">
                        <img src="${log.image || 'https://images.unsplash.com/photo-1594909122845-11baa439b7bf?w=500'}" class="absolute inset-0 w-full h-full object-cover">
                    </div>
                    <div class="p-4 flex flex-col flex-grow justify-between space-y-2">
                        <div>
                            <div class="text-sm font-bold ${titleColor} flex items-center gap-1.5">
                                <i class="fa-regular fa-file-text text-gray-400 text-xs"></i>
                                <span class="truncate">${log.title}</span>
                            </div>
                            <div class="flex flex-wrap gap-1 mt-1.5">${tagSection}</div>
                            <div class="text-amber-500 font-medium text-xs mt-1 tracking-tight">${stars}</div>
                            ${progressGaugeMarkup}
                            <p class="text-xs ${reviewColor} line-clamp-2 mt-2 leading-relaxed">${log.review || '작성된 평이 없습니다.'}</p>
                        </div>
                        <div class="pt-2 border-t text-[10px] text-gray-400 flex items-center font-medium">
                            <i class="fa-regular fa-calendar mr-1"></i>${dateView}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openDetailModal(id) {
            const target = archiveLogs.find(l => l.id === id);
            if (!target) return;

            document.getElementById('modal-id').value = target.id;
            document.getElementById('modal-title').innerText = target.title;
            document.getElementById('modal-type-badge').innerText = target.type;
            document.getElementById('modal-review').value = target.review;
            document.getElementById('modal-rating').value = target.rating;
            document.getElementById('modal-img').src = target.image || 'https://images.unsplash.com/photo-1594909122845-11baa439b7bf?w=500';
            document.getElementById('modal-date-display').innerText = target.start.replace(/-/g, '/');

            const modalProgBox = document.getElementById('modal-progress-box');
            if (target.type === 'BOOK' || target.type === 'DRAMA') {
                modalProgBox.classList.remove('hidden');
                document.getElementById('modal-progress-lbl').innerText = target.type === 'BOOK' ? '독서 트래킹 (페이지)' : '드라마/예능 트래킹 (회차)';
                document.getElementById('modal-progress-total').value = target.totalUnit || 10;
                document.getElementById('modal-progress-current').value = target.currentUnit || 0;
                calculateModalLivePercent();
            } else {
                modalProgBox.classList.add('hidden');
            }

            applyThemeMode(currentThemeMode);
            document.getElementById('detail-modal').classList.remove('hidden');
        }

        function closeDetailModal() {
            document.getElementById('detail-modal').classList.add('hidden');
        }

        function submitUpdateLog() {
            const id = parseInt(document.getElementById('modal-id').value);
            const target = archiveLogs.find(l => l.id === id);
            if(target) {
                target.review = document.getElementById('modal-review').value;
                target.rating = parseInt(document.getElementById('modal-rating').value);
                
                if (target.type === 'BOOK' || target.type === 'DRAMA') {
                    target.totalUnit = parseInt(document.getElementById('modal-progress-total').value) || 1;
                    target.currentUnit = parseInt(document.getElementById('modal-progress-current').value) || 0;
                }

                saveAndRefresh();
                closeDetailModal();
            }
        }

        function submitDeleteLog() {
            const id = parseInt(document.getElementById('modal-id').value);
            if(confirm("이 미디어 로그 기록을 삭제할까요?")) {
                archiveLogs = archiveLogs.filter(l => l.id !== id);
                saveAndRefresh();
                closeDetailModal();
            }
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const type = document.getElementById('form-type').value;
            const title = document.getElementById('form-title').value;
            const tagsIn = document.getElementById('form-tags').value;
            const tags = tagsIn ? tagsIn.split(',').map(t => t.trim()) : [type];
            const start = document.getElementById('form-start').value;
            const end = document.getElementById('form-end').value;
            const rating = parseInt(document.getElementById('form-rating').value);
            const image = document.getElementById('form-image').value;
            const review = document.getElementById('form-review').value;

            let totalUnit = null;
            let currentUnit = null;
            if (type === 'BOOK' || type === 'DRAMA') {
                totalUnit = parseInt(document.getElementById('form-progress-total').value) || 1;
                currentUnit = parseInt(document.getElementById('form-progress-current').value) || 0;
            }

            archiveLogs.unshift({ id: Date.now(), type, title, tags, start, end, rating, image, review, totalUnit, currentUnit });
            saveAndRefresh();
            document.getElementById('media-form').reset();
            document.getElementById('form-start').value = new Date().toISOString().split('T')[0];
            handleTypeChange();
            applyThemeMode(currentThemeMode);
        }

        function saveAndRefresh() {
            localStorage.setItem('archiveLogs', JSON.stringify(archiveLogs));
            renderCards();
            if (googleAccessToken) {
                uploadDataToGoogleDrive(false, false);
            }
        }

            const bMeta = document.getElementById('book-meta-fields');

            const pBox = document.getElementById('progress-tracking-box');

                if(settingsBox) settingsBox.className = "bg-white p-5 rounded-xl border border-[#e9ecef] shadow-sm space-y-4";
                if(formBox) formBox.className = "bg-white p-5 rounded-xl border border-[#e9ecef] shadow-sm sticky top-24 space-y-4";
                if(nav) nav.className = "lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-[#e9ecef] grid grid-cols-4 text-center py-2.5 z-40 shadow-[0_-2px_10px_rgba(0,0,0,0.03)]";
                if(modalBox) modalBox.className = "bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden border border-[#e9ecef] flex flex-col transition-colors duration-150";
                
                if(bookTitle) bookTitle.className = "text-lg font-bold text-[#212529]";
                if(statsTitle) statsTitle.className = "text-lg font-bold text-[#212529] mb-4";
                if(settingsTitle) settingsTitle.className = "text-lg font-bold text-[#212529]";
                if(formTitle) formTitle.className = "text-sm font-bold text-gray-800 flex items-center";
                
                inputLabels.forEach(lbl => { if(lbl) lbl.className = "block mb-1 text-gray-500 font-semibold"; });

                inputs.forEach(input => {
                    if (input) {
                        input.style.backgroundColor = "#f1f3f5";
                        input.style.color = "#495057";
                        input.style.borderColor = "transparent";
                    }
                });

                toggleBtn.className = "text-gray-500 hover:text-gray-900 text-lg p-1.5 rounded-lg hover:bg-gray-100 transition";
                toggleBtn.innerHTML = `<i class="fa-solid fa-moon"></i>`;
            }
            
            if (!googleAccessToken) showSyncStatus('unlinked', '구글 계정 연동');
            else showSyncStatus('success', '구글 로그아웃');
            
            updateFilterButtonsUI();
        }

        function updateFilterButtonsUI() {
            const categories = ['all', 'book', 'movie', 'drama', 'music'];
            const isDark = currentThemeMode === 'dark';

            categories.forEach(cat => {
                const btn = document.getElementById(`btn-filter-${cat}`);
                if (!btn) return;

                if (currentCategory === cat) {
                    btn.className = "filter-btn px-4 py-2 rounded-lg text-sm font-semibold bg-blue-600 text-white shrink-0 shadow-sm transition";
                } else {
                    if (isDark) {
                        btn.className = "filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-[#262930] text-gray-400 hover:bg-[#31353e] hover:text-gray-200 shrink-0 border border-transparent transition";
                    } else {
                        btn.className = "filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-[#f1f3f5] text-[#495057] hover:bg-[#e9ecef] shrink-0 border border-transparent transition";
                    }
                }
            });
        }
        
        function openTab(tabId) {
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(content => content.classList.add('hidden'));
            
            const target = document.getElementById(`${tabId}-tab`) || document.getElementById(`main-${tabId}`);
            if(target) target.classList.remove('hidden');
            
            const navButtons = document.querySelectorAll('.nav-btn');
            navButtons.forEach(btn => {
                btn.classList.remove('text-blue-600');
                btn.classList.add('text-gray-400');
            });
            renderCards();
        }
    </script>
</body>
</html>
