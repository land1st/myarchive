<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        /* 프리텐다드 폰트 최우선 강제 적용 */
        body, input, select, textarea, button {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif !important;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#f8f9fa] text-[#212529] min-h-screen pb-24 lg:pb-6">

    <header class="border-b border-[#e9ecef] bg-white sticky top-0 z-50 px-4 py-3.5 flex items-center justify-between shadow-sm">
        <div onclick="openTab('dashboard')" class="flex items-center space-x-2 cursor-pointer group select-none">
            <span class="text-xl font-extrabold tracking-tight text-blue-600 flex items-center">
                <i class="fa-solid fa-box-archive mr-2 text-blue-500 group-hover:scale-105 transition-transform"></i>My Archive
            </span>
            <span class="text-xs bg-blue-50 text-blue-600 font-semibold px-2 py-0.5 rounded border border-blue-100 hidden sm:inline-block">대시보드 이동</span>
        </div>
        <div class="flex items-center space-x-4">
            <span id="sync-status" class="text-xs bg-emerald-50 text-emerald-600 px-2.5 py-1 rounded-full border border-emerald-200/60 font-medium cursor-pointer" onclick="toggleSync()">
                <i class="fa-solid fa-circle-check mr-1"></i> 구글 동기화 켬
            </span>
            <button onclick="openTab('settings')" class="text-gray-500 hover:text-gray-900 text-lg transition"><i class="fa-solid fa-gear"></i></button>
        </div>
    </header>

    <div class="max-w-[1400px] mx-auto p-4 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <main class="lg:col-span-3 space-y-6">
            
            <section id="main-dashboard" class="space-y-6 tab-content">
                <div class="flex flex-col md:flex-row gap-4 items-center justify-between bg-white p-4 rounded-xl border border-[#e9ecef] shadow-sm">
                    <div class="relative w-full md:w-80">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-gray-400 text-sm"></i>
                        <input type="text" id="search-input" oninput="renderCards()" placeholder="기록된 모든 미디어 검색..." class="w-full bg-[#f1f3f5] pl-10 pr-4 py-2.5 rounded-lg text-sm text-[#495057] focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 border border-transparent transition">
                    </div>
                    <div class="flex space-x-1.5 overflow-x-auto w-full md:w-auto no-scrollbar py-1">
                        <button onclick="filterCategory('all')" id="btn-filter-all" class="filter-btn px-4 py-2 rounded-lg text-sm font-semibold bg-blue-600 text-white shrink-0 shadow-sm transition">전체</button>
                        <button onclick="filterCategory('book')" id="btn-filter-book" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-[#f1f3f5] text-[#495057] hover:bg-[#e9ecef] shrink-0 transition">📚 독서</button>
                        <button onclick="filterCategory('movie')" id="btn-filter-movie" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-[#f1f3f5] text-[#495057] hover:bg-[#e9ecef] shrink-0 transition">🎬 영화</button>
                        <button onclick="filterCategory('drama')" id="btn-filter-drama" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-[#f1f3f5] text-[#495057] hover:bg-[#e9ecef] shrink-0 transition">📺 드라마</button>
                        <button onclick="filterCategory('music')" id="btn-filter-music" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-[#f1f3f5] text-[#495057] hover:bg-[#e9ecef] shrink-0 transition">🎵 음악</button>
                    </div>
                </div>

                <div id="media-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-5">
                    </div>
            </section>

            <section id="book-search-tab" class="tab-content hidden space-y-4">
                <div class="bg-white p-5 rounded-xl border border-[#e9ecef] shadow-sm space-y-4">
                    <h2 class="text-lg font-bold text-[#212529]"><i class="fa-solid fa-book text-blue-500 mr-2"></i>독서 자동 기록 검색</h2>
                    <div class="flex gap-2">
                        <input type="text" id="api-book-search" placeholder="책 제목, 저자명을 입력해 보세요..." class="w-full bg-[#f1f3f5] px-4 py-3 rounded-lg text-sm focus:outline-none border border-transparent focus:border-blue-500">
                        <button onclick="simulateBookSearch()" class="bg-blue-600 text-white px-5 py-3 rounded-lg text-sm font-semibold hover:bg-blue-700 shrink-0"><i class="fa-solid fa-magnifying-glass"></i> 검색</button>
                    </div>
                    <div id="search-results" class="space-y-2 hidden">
                        <div onclick="selectBook('프로젝트 헤일메리', '앤디 위어', 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500')" class="flex items-center gap-4 bg-[#f8f9fa] p-3 rounded-xl cursor-pointer hover:border-blue-500 border border-transparent transition shadow-sm">
                            <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500" class="w-10 h-14 object-cover rounded shadow-sm">
                            <div>
                                <h4 class="text-sm font-bold text-black">프로젝트 헤일메리</h4>
                                <p class="text-xs text-gray-500">저자: 앤디 위어 | 출판사: 알에이치코리아</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="stats-tab" class="tab-content hidden space-y-4">
                <div class="bg-white p-5 rounded-xl border border-[#e9ecef] shadow-sm">
                    <h2 class="text-lg font-bold mb-4"><i class="fa-solid fa-chart-line text-blue-500 mr-2"></i>기록 분석 통계</h2>
                    <div class="space-y-4">
                        <div>
                            <div class="flex justify-between text-xs font-semibold mb-1"><span>🎬 영화 / 드라마</span><span id="stat-count-media">0개</span></div>
                            <div class="w-full bg-[#e9ecef] h-2.5 rounded-full"><div class="bg-blue-500 h-2.5 rounded-full" style="width: 70%"></div></div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="settings-tab" class="tab-content hidden space-y-4">
                <div class="bg-white p-5 rounded-xl border border-[#e9ecef] shadow-sm space-y-4">
                    <h2 class="text-lg font-bold"><i class="fa-solid fa-sliders text-blue-500 mr-2"></i>시스템 옵션</h2>
                    <div class="flex flex-wrap gap-2 pt-2">
                        <button onclick="exportData()" class="bg-white text-[#495057] border border-[#ced4da] px-4 py-2.5 rounded-lg text-xs font-semibold hover:bg-[#f1f3f5] transition"><i class="fa-solid fa-file-export mr-1"></i> 데이터 내보내기 (JSON)</button>
                        <button onclick="shareApp()" class="bg-blue-50 text-blue-600 px-4 py-2.5 rounded-lg text-xs font-semibold hover:bg-blue-100 transition"><i class="fa-solid fa-share-nodes mr-1"></i>앱 주소 공유</button>
                    </div>
                </div>
            </section>
        </main>

        <aside class="hidden lg:block lg:col-span-1">
            <div class="bg-white p-5 rounded-xl border border-[#e9ecef] shadow-sm sticky top-24 space-y-4">
                <h3 class="text-sm font-bold text-gray-800 flex items-center"><i class="fa-solid fa-pen-to-square text-blue-500 mr-2"></i>새 미디어 기록</h3>
                
                <form id="media-form" onsubmit="handleFormSubmit(event)" class="space-y-3.5 text-xs">
                    <div>
                        <label class="block mb-1 text-gray-500 font-semibold">구분</label>
                        <select id="form-type" onchange="handleTypeChange()" class="w-full bg-[#f1f3f5] border-transparent rounded-lg p-2.5 text-[#495057] font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500/20">
                            <option value="MOVIE">🎬 영화</option>
                            <option value="DRAMA">📺 드라마</option>
                            <option value="BOOK">📚 독서</option>
                            <option value="MUSIC">🎵 음악</option>
                        </select>
                    </div>
                    <div>
                        <label class="block mb-1 text-gray-500 font-semibold">콘텐츠 제목</label>
                        <input type="text" id="form-title" required class="w-full bg-[#f1f3f5] border-transparent rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20" placeholder="제목 입력">
                    </div>
                    <div id="book-meta-fields" class="hidden">
                        <label class="block mb-1 text-gray-500 font-semibold">저자 / 출판사</label>
                        <input type="text" id="form-author" class="w-full bg-[#f1f3f5] border-transparent rounded-lg p-2.5 focus:outline-none" placeholder="예: 앤디 위어">
                    </div>
                    <div>
                        <label class="block mb-1 text-gray-500 font-semibold">플랫폼 / 커스텀 태그</label>
                        <input type="text" id="form-tags" class="w-full bg-[#f1f3f5] border-transparent rounded-lg p-2.5 focus:outline-none" placeholder="쉼표로 구분 (예: 넷플릭스, 아이맥스)">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block mb-1 text-gray-500 font-semibold">시작(관람)일</label>
                            <input type="date" id="form-start" class="w-full bg-[#f1f3f5] border-transparent rounded-lg p-2 focus:outline-none">
                        </div>
                        <div>
                            <label class="block mb-1 text-gray-500 font-semibold">종료일</label>
                            <input type="date" id="form-end" class="w-full bg-[#f1f3f5] border-transparent rounded-lg p-2 focus:outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block mb-1 text-gray-500 font-semibold">평점</label>
                        <select id="form-rating" class="w-full bg-[#f1f3f5] border-transparent rounded-lg p-2.5 text-amber-500 font-bold focus:outline-none">
                            <option value="5">⭐⭐⭐⭐⭐ (5.0)</option>
                            <option value="4">⭐⭐⭐⭐☆ (4.0)</option>
                            <option value="3">⭐⭐⭐☆☆ (3.0)</option>
                            <option value="2">⭐⭐☆☆☆ (2.0)</option>
                            <option value="1">⭐☆☆☆☆ (1.0)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block mb-1 text-gray-500 font-semibold">커버 이미지 웹 주소 (URL)</label>
                        <input type="url" id="form-image" class="w-full bg-[#f1f3f5] border-transparent rounded-lg p-2.5 focus:outline-none" placeholder="https://...">
                    </div>
                    <div>
                        <label class="block mb-1 text-gray-500 font-semibold">한줄평 / 감상 기록</label>
                        <textarea id="form-review" rows="3" class="w-full bg-[#f1f3f5] border-transparent rounded-lg p-2.5 focus:outline-none" placeholder="기록하고 싶은 감상을 작성하세요..."></textarea>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition text-sm shadow-sm">
                        로그 저장하기
                    </button>
                </form>
            </div>
        </aside>
    </div>

    <nav class="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-[#e9ecef] grid grid-cols-4 text-center py-2.5 z-40 shadow-[0_-2px_10px_rgba(0,0,0,0.03)]">
        <button onclick="openTab('dashboard')" class="nav-btn text-blue-600 flex flex-col items-center justify-center space-y-1">
            <i class="fa-solid fa-chart-simple text-lg"></i><span class="text-[10px] font-bold">대시보드</span>
        </button>
        <button onclick="openTab('book-search')" class="nav-btn text-gray-400 flex flex-col items-center justify-center space-y-1">
            <i class="fa-solid fa-magnifying-glass text-lg"></i><span class="text-[10px] font-medium">북 검색</span>
        </button>
        <button onclick="openTab('stats')" class="nav-btn text-gray-400 flex flex-col items-center justify-center space-y-1">
            <i class="fa-solid fa-pie-chart text-lg"></i><span class="text-[10px] font-medium">통계</span>
        </button>
        <button onclick="openTab('settings')" class="nav-btn text-gray-400 flex flex-col items-center justify-center space-y-1">
            <i class="fa-solid fa-sliders text-lg"></i><span class="text-[10px] font-medium">설정</span>
        </button>
    </nav>

    <div id="detail-modal" class="fixed inset-0 bg-black/50 items-center justify-center z-50 p-4 hidden flex">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden border border-[#e9ecef] flex flex-col animate-in fade-in zoom-in-95 duration-150">
            <div class="relative h-48 bg-[#f1f3f5] overflow-hidden">
                <img id="modal-img" src="" class="w-full h-full object-cover">
                <button onclick="closeDetailModal()" class="absolute top-3 right-3 bg-black/40 hover:bg-black/60 text-white w-8 h-8 rounded-full flex items-center justify-center transition"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="p-5 space-y-4 flex-grow text-xs">
                <input type="hidden" id="modal-id">
                <div>
                    <span id="modal-type-badge" class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded text-[10px] font-bold border border-blue-100">TYPE</span>
                    <h3 id="modal-title" class="text-base font-bold text-[#212529] mt-1.5">콘텐츠 명</h3>
                </div>
                
                <div class="space-y-3">
                    <div>
                        <label class="block text-gray-400 font-semibold mb-1">한줄평 수정</label>
                        <textarea id="modal-review" rows="3" class="w-full bg-[#f1f3f5] p-2.5 rounded-lg text-sm text-[#495057] focus:outline-none focus:ring-1 focus:ring-blue-500 border border-transparent"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-gray-400 font-semibold mb-1">평점 수정</label>
                            <select id="modal-rating" class="w-full bg-[#f1f3f5] p-2 rounded-lg font-bold text-amber-500 text-sm focus:outline-none">
                                <option value="5">⭐⭐⭐⭐⭐</option>
                                <option value="4">⭐⭐⭐⭐☆</option>
                                <option value="3">⭐⭐⭐☆☆</option>
                                <option value="2">⭐⭐☆☆☆</option>
                                <option value="1">⭐☆☆☆☆</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-gray-400 font-semibold mb-1">기록일 확인</label>
                            <div id="modal-date-display" class="bg-[#f1f3f5] p-2 rounded-lg text-gray-600 font-medium text-center text-sm">2026/05/21</div>
                        </div>
                    </div>
                </div>

                <div class="flex items-center gap-2 pt-3 border-t border-[#e9ecef]">
                    <button onclick="submitUpdateLog()" class="flex-grow bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg text-xs font-bold transition">수정사항 저장</button>
                    <button onclick="submitDeleteLog()" class="bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 px-4 py-2.5 rounded-lg text-xs font-bold transition">삭제</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 초기 예시 데이터 완벽 매칭 세팅
        const defaultArchive = [
            { id: 1, type: 'DRAMA', title: '사냥개들2', tags: ['DRAMA', '넷플릭스', '완주'], rating: 5, review: '액션은 최고 수준', start: '2026-04-03', end: '2026-04-05', image: 'https://images.unsplash.com/photo-1601513525393-8393e2938e36?w=500' },
            { id: 2, type: 'DRAMA', title: '레이디두아', tags: ['DRAMA', '넷플릭스', '완주'], rating: 4, review: '명품? No 사치품 !!!', start: '2026-03-27', end: '2026-03-28', image: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=500' },
            { id: 3, type: 'MOVIE', title: '행복의 나라로', tags: ['MOVIE'], rating: 5, review: '이선균 송영규 두 분 명목을 빕니다.', start: '2026-03-23', end: '', image: 'https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=500' },
            { id: 4, type: 'BOOK', title: '프로젝트 헤일 메리', tags: ['MOVIE', 'IMAX'], rating: 5, review: '아이맥스 최고', start: '2026-03-21', end: '', image: 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=500' }
        ];

        let archiveLogs = JSON.parse(localStorage.getItem('archiveLogs')) || defaultArchive;
        let currentCategory = 'all';

        window.onload = function() {
            renderCards();
            document.getElementById('form-start').value = new Date().toISOString().split('T')[0];
        };

        // 미디어 카드 렌더링
        function renderCards() {
            const grid = document.getElementById('media-grid');
            const keyword = document.getElementById('search-input').value.toLowerCase();
            grid.innerHTML = '';

            const items = archiveLogs.filter(log => {
                const isCat = currentCategory === 'all' || log.type.toLowerCase() === currentCategory;
                const isKey = log.title.toLowerCase().includes(keyword) || log.review.toLowerCase().includes(keyword);
                return isCat && isKey;
            });

            document.getElementById('stat-count-media').innerText = `${archiveLogs.length}개`;

            if (items.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-16 text-gray-400 text-sm">아카이브가 텅 비어 있습니다.</div>`;
                return;
            }

            items.forEach(log => {
                const stars = '★'.repeat(log.rating) + '☆'.repeat(5 - log.rating);
                const tagSection = log.tags.map(t => `<span class="bg-[#f1f3f5] text-[#495057] px-2 py-0.5 rounded text-[10px] font-semibold border border-[#e9ecef]">${t}</span>`).join('');
                const dateView = log.end ? `${log.start.replace(/-/g, '/')} - ${log.end.replace(/-/g, '/')}` : log.start.replace(/-/g, '/');

                const card = document.createElement('div');
                card.className = "bg-white rounded-xl overflow-hidden border border-[#e9ecef] shadow-sm hover:shadow-md hover:border-gray-300 transition duration-200 cursor-pointer flex flex-col";
                // 클릭 시 세부 모달 창을 띄우는 이벤트 바인딩
                card.setAttribute("onclick", `openDetailModal(${log.id})`);
                
                card.innerHTML = `
                    <div class="relative pt-[52%] bg-[#f1f3f5] overflow-hidden">
                        <img src="${log.image || 'https://images.unsplash.com/photo-1594909122845-11baa439b7bf?w=500'}" class="absolute inset-0 w-full h-full object-cover">
                    </div>
                    <div class="p-4 flex flex-col flex-grow justify-between space-y-2">
                        <div>
                            <div class="text-sm font-bold text-black flex items-center gap-1.5">
                                <i class="fa-regular fa-file-text text-gray-400 text-xs"></i>
                                <span class="truncate">${log.title}</span>
                            </div>
                            <div class="flex flex-wrap gap-1 mt-1.5">${tagSection}</div>
                            <div class="text-amber-500 font-medium text-xs mt-1 tracking-tight">${stars}</div>
                            <p class="text-xs text-[#495057] line-clamp-2 mt-1 leading-relaxed">${log.review || '작성된 평이 없습니다.'}</p>
                        </div>
                        <div class="pt-2 border-t border-[#f1f3f5] text-[10px] text-gray-400 flex items-center font-medium">
                            <i class="fa-regular fa-calendar mr-1"></i>${dateView}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 세부 페이지 모달 열기 함수 (수정요청 3번 핵심 구현)
        function openDetailModal(id) {
            const target = archiveLogs.find(l => l.id === id);
            if (!target) return;

            document.getElementById('modal-id').value = target.id;
            document.getElementById('modal-title').innerText = target.title;
            document.getElementById('modal-type-badge').innerText = target.type;
            document.getElementById('modal-review').value = target.review;
            document.getElementById('modal-rating').value = target.rating;
            document.getElementById('modal-img').src = target.image || 'https://images.unsplash.com/photo-1594909122845-11baa439b7bf?w=500';
            document.getElementById('modal-date-display').innerText = target.start.replace(/-/g, '/');

            document.getElementById('detail-modal').classList.remove('hidden');
        }

        function closeDetailModal() {
            document.getElementById('detail-modal').classList.add('hidden');
        }

        // 모달 내부 수정사항 저장 처리
        function submitUpdateLog() {
            const id = parseInt(document.getElementById('modal-id').value);
            const target = archiveLogs.find(l => l.id === id);
            if(target) {
                target.review = document.getElementById('modal-review').value;
                target.rating = parseInt(document.getElementById('modal-rating').value);
                saveAndRefresh();
                closeDetailModal();
            }
        }

        // 모달 내부 삭제 기능 처리
        function submitDeleteLog() {
            const id = parseInt(document.getElementById('modal-id').value);
            if(confirm("이 미디어 로그 기록을 삭제할까요?")) {
                archiveLogs = archiveLogs.filter(l => l.id !== id);
                saveAndRefresh();
                closeDetailModal();
            }
        }

        // 신규 데이터 추가 폼 핸들러
        function handleFormSubmit(e) {
            e.preventDefault();
            const type = document.getElementById('form-type').value;
            const title = document.getElementById('form-title').value;
            const tagsIn = document.getElementById('form-tags').value;
            const tags = tagsIn ? tagsIn.split(',').map(t => t.trim()) : [type];
            const start = document.getElementById('form-start').value;
            const end = document.getElementById('form-end').value;
            const rating = parseInt(document.getElementById('form-rating').value);
            const image = document.getElementById('form-image').value;
            const review = document.getElementById('form-review').value;

            archiveLogs.unshift({ id: Date.now(), type, title, tags, start, end, rating, image, review });
            saveAndRefresh();
            document.getElementById('media-form').reset();
            document.getElementById('form-start').value = new Date().toISOString().split('T')[0];
        }

        function saveAndRefresh() {
            localStorage.setItem('archiveLogs', JSON.stringify(archiveLogs));
            renderCards();
        }

        // 카테고리 스위칭 필터링
        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('bg-blue-600', 'text-white', 'shadow-sm');
                b.classList.add('bg-[#f1f3f5]', 'text-[#495057]');
            });
            const active = document.getElementById(`btn-filter-${cat}`);
            active.classList.remove('bg-[#f1f3f5]', 'text-[#495057]');
            active.classList.add('bg-blue-600', 'text-white', 'shadow-sm');
            renderCards();
        }

        function handleTypeChange() {
            const bMeta = document.getElementById('book-meta-fields');
            if(document.getElementById('form-type').value === 'BOOK') bMeta.classList.remove('hidden');
            else bMeta.classList.add('hidden');
        }

        function simulateBookSearch() {
            document.getElementById('search-results').classList.remove('hidden');
        }

        function selectBook(title, author, img) {
            document.getElementById('form-type').value = "BOOK";
            document.getElementById('form-title').value = title;
            document.getElementById('form-author').value = author;
            document.getElementById('form-image').value = img;
            handleTypeChange();
            openTab('dashboard');
            alert(`[${title}] 정보가 입력창에 복사되었습니다. 저장 버튼을 누르면 확정됩니다.`);
        }

        function openTab(name) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            const targetSection = document.getElementById(`${name}-tab`) || document.getElementById('main-dashboard');
            targetSection.classList.remove('hidden');

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-blue-600');
                btn.classList.add('text-gray-400');
            });
        }

        function exportData() {
            const link = document.createElement('a');
            link.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(archiveLogs));
            link.download = `my_archive_data.json`;
            link.click();
        }

        function shareApp() {
            navigator.clipboard.writeText(window.location.href);
            alert("앱 링크 주소가 성공적으로 복사되었습니다!");
        }

        function toggleSync() {
            alert("구글 계정 실시간 데이터 동기화 옵션 상태를 전환합니다.");
        }
    </script>
</body>
</html>
